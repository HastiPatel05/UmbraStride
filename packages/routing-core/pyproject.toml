[project]
name = "umbrastride-routing-core"
version = "0.1.0"
description = "Alpha-weighted shade routing for UmbraStride"
authors = [
    { name = "Tanmay Godse" },
    { name = "Hasti Pareshbhai Patel" },
]
license = { text = "CC BY-NC 4.0" }
requires-python = ">=3.11"
dependencies = [
    "networkx>=3.2",
    "numpy>=1.26",
    "rustworkx>=0.15",
    "umbrastride-geo-core",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
